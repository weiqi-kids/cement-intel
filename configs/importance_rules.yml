# 水泥供應鏈 - 重要性評分規則

# 基礎分數為 0.5，加上各規則分數，上限 1.0
rules:
- name: 多公司提及
  condition: entities.companies.length > 1
  score: 0.2
  description: 新聞同時提及多家公司，通常代表產業事件
- name: 涉及水泥價格
  condition: '''cement_pricing'' in topics'
  score: 0.25
  description: 水泥價格變動直接影響營收
- name: 涉及基建支出
  condition: '''infrastructure_spending'' in topics'
  score: 0.3
  description: 基建支出是水泥需求的主要驅動力
- name: 涉及財報
  condition: '''earnings'' in topics'
  score: 0.25
  description: 財報是重要的資訊揭露
- name: 情緒極端
  condition: abs(sentiment.score) > 0.7
  score: 0.15
  description: 極端情緒通常代表重大事件
- name: 供應鏈上下游同時提及
  condition: has_upstream_downstream_mention
  score: 0.2
  description: 供應鏈連動通常是重要訊號
- name: 涉及產能
  condition: '''capacity'' in topics or ''capex'' in topics'
  score: 0.15
  description: 產能變動影響供需平衡
- name: 涉及碳排放
  condition: '''carbon_emissions'' in topics'
  score: 0.25
  description: 碳排放是水泥產業最大的長期挑戰
- name: 涉及產能整合
  condition: '''capacity_consolidation'' in topics'
  score: 0.2
  description: 產能整合影響產業格局
- name: 涉及原料能源成本
  condition: '''raw_material_energy_cost'' in topics'
  score: 0.2
  description: 能源和原料成本是水泥業最大變數
